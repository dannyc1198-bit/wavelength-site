<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavelength Ad 01 — Missed Calls</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080810;display:flex;align-items:center;justify-content:center;min-height:100vh;}

/* 1080x1080 Instagram/Facebook square */
.ad{width:1080px;height:1080px;background:#080810;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px;}

/* Background grid */
.ad::before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(120,100,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(120,100,255,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);}

/* Glow orb */
.orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(120,100,255,0.14) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

/* Red accent orb */
.orb-red{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,80,80,0.1) 0%,transparent 70%);top:15%;right:10%;pointer-events:none;}

.content{position:relative;z-index:1;}

.stat{font-family:"Syne",sans-serif;font-size:180px;font-weight:800;color:#ff4d4d;line-height:1;margin-bottom:8px;text-shadow:0 0 80px rgba(255,77,77,0.3);}
.stat-label{font-family:"Syne",sans-serif;font-size:28px;font-weight:600;color:#6e6e88;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:60px;}

.headline{font-family:"Instrument Serif",serif;font-size:64px;font-weight:400;color:#ffffff;line-height:1.15;margin-bottom:24px;max-width:800px;}
.headline em{font-style:italic;color:#a394ff;}

.subtext{font-family:"Syne",sans-serif;font-size:22px;color:#6e6e88;line-height:1.6;max-width:650px;margin:0 auto 56px;}

.cta-btn{display:inline-block;background:#7864ff;color:#fff;font-family:"Syne",sans-serif;font-size:20px;font-weight:700;padding:20px 52px;border-radius:6px;letter-spacing:0.06em;text-transform:uppercase;}

.logo-bar{position:absolute;bottom:48px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:12px;}
.logo-mark{width:32px;height:32px;border:1.5px solid #7864ff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#a394ff;font-family:"Syne",sans-serif;}
.logo-text{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#ffffff;}
</style>
</head>
<body>
<div class="ad">
  <div class="orb"></div>
  <div class="orb-red"></div>
  <div class="content">
    <div class="stat">62%</div>
    <div class="stat-label">of calls go unanswered</div>
    <h1 class="headline">Every missed call is a <em>missed client</em></h1>
    <p class="subtext">Our AI receptionist answers every call in under 2 seconds. 24/7. No hold music. No voicemail.</p>
    <div class="cta-btn">Stop Losing Revenue →</div>
  </div>
  <div class="logo-bar">
    <div class="logo-mark">W</div>
    <div class="logo-text">Wavelength</div>
  </div>
</div>
</body>
</html>
